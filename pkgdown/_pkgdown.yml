url: https://www.indrapatil.com/statsExpressions/

authors:
  Indrajeet Patil:
    href: https://www.indrapatil.com/

template:
  bootstrap: 5
  light-switch: true
  includes:
    in-header: |
      <!-- Google tag (gtag.js) -->
      <script async src="https://www.googletagmanager.com/gtag/js?id=G-3BQ49J7KYH"></script>
      <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-3BQ49J7KYH');
      </script>
      <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareSourceCode",
        "name": "statsExpressions",
        "description": "Utilities for producing dataframes with rich details for the most common types of statistical approaches and tests: parametric, nonparametric, robust, and Bayesian t-test, one-way ANOVA, correlation analyses, contingency table analyses, and meta-analyses.",
        "url": "https://www.indrapatil.com/statsExpressions/",
        "codeRepository": "https://github.com/IndrajeetPatil/statsExpressions",
        "programmingLanguage": {
          "@type": "ComputerLanguage",
          "name": "R"
        },
        "license": "https://opensource.org/licenses/MIT",
        "version": "2.0.0",
        "author": {
          "@type": "Person",
          "name": "Indrajeet Patil",
          "url": "https://www.indrapatil.com/",
          "sameAs": "https://orcid.org/0000-0003-1995-6531"
        },
        "keywords": ["R", "statistics", "tidy data", "effect sizes", "Bayesian", "frequentist", "nonparametric", "robust statistics", "ggplot2", "dataframes"]
      }
      </script>
      <meta name="citation_title" content="statsExpressions: Tidy Dataframes and Expressions with Statistical Details" />
      <meta name="citation_author" content="Indrajeet Patil" />
      <meta name="citation_year" content="2021" />
      <meta name="citation_doi" content="10.21105/joss.03236" />
      <meta name="citation_journal_title" content="Journal of Open Source Software" />
      <link rel="alternate" type="text/plain" href="/statsExpressions/llms.txt" title="LLM-friendly documentation summary" />
      <link rel="alternate" type="text/plain" href="/statsExpressions/llms-full.txt" title="Full LLM documentation" />
  bslib:
    base_font: { google: "Roboto" }
    heading_font: { google: "Roboto" }
    code_font: { google: "JetBrains Mono" }
  opengraph:
    image:
      src: man/figures/card.png

# development:
#   mode: auto

reference:
  - title: One-and two-sample t-tests
    desc: Dataframes and expressions for one-and two-sample t-tests
    contents:
      - matches("sample")

  - title: One-way ANOVA
    desc: Dataframes and expressions one-way (both between-and within-subject designs) ANOVA
    contents:
      - matches("anova")

  - title: Correlation analysis
    desc: Dataframes and expressions for correlation tests
    contents:
      - matches("corr_")

  - title: Contingency table analysis
    desc: Dataframes and expressions for contingency table analysis and one-sample goodness of fit proportion test
    contents:
      - matches("contingency_")

  - title: Meta-analysis
    desc: Dataframes and expressions for random-effects meta-analysis
    contents:
      - matches("meta_")

  - title: Pairwise comparisons
    desc: Multiple pairwise comparison tests for one-way design
    contents:
      - matches("pairwise_")

  - title: Centrality measure
    desc: Dataframes and expressions for descriptive statistics
    contents:
      - matches("centrality_")

  - title: Helper functions
    desc: Note that these helper functions are not stable and may change in the future.
    contents:
      - matches("_template")
      - matches("tidy_")
      - extract_stats_type
      - long_to_wide_converter
      - add_expression_col

  - title: Data
    desc: Datasets included in the package.
    contents:
      - movies_long
      - iris_long
      - bugs_long
