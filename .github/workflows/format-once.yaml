on:
  pull_request:

name: format-once

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: posit-dev/setup-air@v1
        with:
          version: 0.9.0

      - name: Check (merge commit default)
        run: air format . --check || true

      - name: Show git ref
        run: git log --oneline -3 && echo "SHA=${{ github.sha }}"
