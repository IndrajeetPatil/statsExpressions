on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: check-readme

jobs:
  check-readme:
    uses: IndrajeetPatil/workflows/.github/workflows/check-readme.yaml@main
    with:
      extra-packages: |
        local::.
        any::ggridges
        any::ggbeeswarm
        any::PairedData
        any::metaviz
      http-user-agent: release
